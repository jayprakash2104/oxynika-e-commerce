    <!-- From Uiverse.io by Gautammsharma --> 
    <div class="grid-wrapper">
    <div class="grid-background"></div>
    </div>


    <div class="container">

        <app-section-heading
            tag="About Oxynika"
            [heading]="headingSegments"
            [description]="headingDescription"
            headingClass="fs-1"
        >
        </app-section-heading>


        <section class="about-story py-5">

            <div class="row align-items-center g-5">

                <div class="col-lg-6">

                    <div class="story-image overflow-hidden rounded-4">

                    </div>

                </div>

                <div class="col-lg-6">

                    <div class="story-content">

                        <span class="section-tag">

                            Our Story

                        </span>

                            <br>
                            Driven by purpose.

                        </h2>

                        <p class="mt-4">

                            Every Oxynika product begins with a simple belief—
                            wellness should be honest, effective and effortless.
                            We carefully source natural ingredients and combine

                    </div>

                </div>

        </section>
