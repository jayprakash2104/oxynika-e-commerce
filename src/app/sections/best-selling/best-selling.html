<section class="best-selling-section py-5">

    <div class="container">

        <!-- Section Heading -->

        <app-section-heading
            tag="Explore Collections"
            [heading]="headingSegments"
            [description]="headingDescription"
            headingClass="fs-1"
        >
        </app-section-heading>

        <!-- Collection Grid -->

        <div class="collection-grid">

            <!-- Card 01 -->

            <a
                href="javascript:void(0)"
                class="collection-card">

                <img
                    src="/images/products/best-selling.png"
                    alt="Shilajit Collection">

                <div class="overlay"></div>

                <div class="content">

                    <span class="category">
                        Himalayan Wellness
                    </span>

                    <h3>
                        Shilajit Collection
                    </h3>

                </div>

                <div class="action">

                    <i class="bi bi-arrow-right"></i>

                </div>

            </a>

            <!-- Card 02 -->

            <a
                href="javascript:void(0)"
                class="collection-card">

                <img
                    src="/images/products/best-selling1.png"

                <div class="overlay"></div>

                <div class="content">

                    <span class="category">
                        Everyday Care
                    </span>

                    <h3>
                        Skin Care Essentials
                    </h3>

                </div>

                <div class="action">

                    <i class="bi bi-arrow-right"></i>

                </div>

            </a>

            <!-- Card 03 -->

            <a

                <img

                <div class="content">

                    <span class="category">
                        Healthy Hair
                    </span>

                        Hair Care Collection

                    <i class="bi bi-arrow-right"></i>

            </a>

            <a

                <img
                    src="/images/products/best-selling3.png"

                    <span class="category">
