<section class="hero">

    <div class="container">

        <div class="hero-slider">

            <swiper-container
                slides-per-view="1"
                loop="true"
                speed="700"
                navigation="true"
                pagination="true"
                pagination-clickable="true"
                autoplay-delay="5000"
                autoplay-disable-on-interaction="false"
                mousewheel="true"
                mousewheel-force-to-axis="true"
            >

                <swiper-slide>

                    <img
                        src="/images/hero/hero1.jpeg"
                        alt="Hero Banner">

                </swiper-slide>

                <swiper-slide>

                    <img
                        src="/images/hero/hero2.png"
                        alt="Hero Banner">

                </swiper-slide>

                <swiper-slide>

                    <img
                        src="/images/hero/hero3.png"
                        alt="Hero Banner">

                </swiper-slide>

            </swiper-container>

        </div>

    </div>

</section>
